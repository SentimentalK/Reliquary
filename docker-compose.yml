version: '3.8'

services:
  # ==========================================================================
  # Backend - FastAPI Python Service
  # ==========================================================================
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: ghcr.io/sentimentalk/vortex-backend:latest
    container_name: vortex-backend
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DEFAULT_PIPELINE=${DEFAULT_PIPELINE:-raw}
      - ADMIN_INVITE_CODE=${ADMIN_INVITE_CODE:-vortex-admin-2026}
      - USER_INVITE_CODE=${USER_INVITE_CODE:-vortex-user-2026}
      - REQUIRE_AUTH=${REQUIRE_AUTH:-true}
      - STORAGE_ROOT=/app/data
    volumes:
      # Mount local data directory for persistent storage
      - ./data:/app/data
    expose:
      - "8080"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - vortex-network

  # ==========================================================================
  # Frontend - Nginx + Static React Files (HTTPS)
  # ==========================================================================
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: ghcr.io/sentimentalk/vortex-frontend:latest
    container_name: vortex-frontend
    restart: unless-stopped
    ports:
      # Internal HTTP Port (for local access or reverse proxy)
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - vortex-network

# ==========================================================================
# Networks
# ==========================================================================
networks:
  vortex-network:
    driver: bridge
