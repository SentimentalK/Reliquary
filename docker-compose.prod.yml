# Production Docker Compose
# Pull-only - no build context, images from GHCR
# Usage: docker compose -f docker-compose.prod.yml up -d
services:
  gateway:
    image: caddy:alpine
    container_name: reliquary-gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - reliquary-network

  backend:
    image: ghcr.io/sentimentalk/reliquary-backend:latest
    container_name: reliquary-backend
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DEFAULT_PIPELINE=${DEFAULT_PIPELINE:-raw}
      - ADMIN_INVITE_CODE=${ADMIN_INVITE_CODE:-reliquary-admin-2026}
      - USER_INVITE_CODE=${USER_INVITE_CODE:-reliquary-user-2026}
      - REQUIRE_AUTH=${REQUIRE_AUTH:-true}
      - STORAGE_ROOT=/app/data
    volumes:
      - ./data:/app/data
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - reliquary-network

  frontend:
    image: ghcr.io/sentimentalk/reliquary-frontend:latest
    container_name: reliquary-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - reliquary-network

volumes:
  caddy_data:
  caddy_config:


networks:
  reliquary-network:
    driver: bridge
